<!DOCTYPE html>
<html>

<head>
    <title>HealthPulse</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <button onclick="toggleDarkMode()">🌙 Dark Mode</button>

        <h1>HealthPulse 🏥</h1>

        <p>Your Personal Wellness Assessment Tool</p>

        <label>Gender:</label>
        <select id="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>

        <br><br>

        <label>Age:</label>
        <input type="number" id="age">

        <br><br>

        <label>Height (Feet):</label>
        <input type="number" id="feet">

        <br><br>

        <label>Height (Inches):</label>
        <input type="number" id="inches">

        <br><br>

        <label>Weight (kg):</label>
        <input type="number" id="weight">

        <br><br>

        <label>Sleep Hours:</label>
        <input type="number" id="sleep">

        <br><br>

        <label>Water Glasses/Day:</label>
        <input type="number" id="water">

        <br><br>

        <label>Smoking:</label>
        <select id="smoking">
            <option value="no">No</option>
            <option value="yes">Yes</option>
        </select>

        <label>Stress Level:</label>
        <select id="stress">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
        </select>

        <br><br>

        <label>Screen Time (hours/day):</label>
        <input type="number" id="screen">

        <br><br>

        <br><br>

        <label>Activity Level:</label>
        <select id="activity">
            <option value="sedentary">Sedentary (Office job, little exercise)</option>
            <option value="light">Lightly Active (1-3 days/week)</option>
            <option value="moderate">Moderately Active (3-5 days/week)</option>
            <option value="very">Very Active (6-7 days/week)</option>
            <option value="extreme">Extremely Active (Athlete)</option>
        </select>

        <br><br>

  <button onclick="checkHealth()">Check Health</button>

<br><br>

<button onclick="resetForm()">Reset Form</button>

<br><br>

<button onclick="downloadReport()">📄 Download Report</button>

<br><br>


        <br><br>

        <div id="result"></div>

        <script src="script.js"></script>

    </div>

</body>

</html>
